<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganhos Gastos e Metas</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Ganhos Gastos e Metas</h1>

    <div class="container">
        <div id="ganhos">
            Ganhos <input type="number" step="0.01" value="">
        </div>
        <div id="gastos">
            Outros Gastos <input type="number" step="0.01" value="">
        </div>
        <div id="km-queimado">
            KM Rodados <input type="text" value="" readonly>
        </div>
        <div id="km-inicial">
            KM Inicial <input type="number" value="">
        </div>
        <div id="km-final">
            KM Final <input type="number" value="">
        </div>
        <div id="gasto-por-km">
            Gasto por KM <input type="number" step="0.01" value="">
        </div>
        <div id="gastos-combustivel">
            Gastos Combustível <input type="text" value="" readonly>
        </div>
        <div id="conta-santander">
            Conta Santander <input type="number" step="0.01" value="">
        </div>
        <div id="caixa-dinheiro">
            Em dinheiro <input type="number" step="0.01" value="">
        </div>
        <div id="banco-do-brasil">
            Banco do Brasil <input type="number" step="0.01" value="">
        </div>
        <div id="meta-diaria">
            Meta Diária <input type="number" step="0.01" value="">
        </div>
        <div id="falta-meta">
            Falta pra Meta <input type="text" value="" readonly>
        </div>
        <div id="lucro-dia">
            Lucro do Dia <input type="text" value="" readonly>
        </div>
        <div id="saldo" class="oculto">
            Saldo Total <input type="text" value="" readonly>
        </div>

        <button id="btn-limpar" class="oculto">Limpar Tudo</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
