<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos e Ganhos</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Ganhos Gastos e Metas</h1>

    <div class="container">
        <div id="ganhos">
            Ganhos <input type="number" step="0.01" value="">
        </div>
        <div id="gastos">
            Gastos <input type="number" step="0.01" value="">
        </div>
        <div id="km-queimado">
            km-queimados <input type="number" value="" readonly>
        </div>
        <div id="km-inicial">
            km-inicial <input type="number" value="">
        </div>
        <div id="km-final">
            km-Final <input type="number" value="">
        </div>
        <div id="combustivel">
            Combustivel <input type="number" step="0.01" value="">
        </div>
        <div id="conta-santander">
            conta santander <input type="number" step="0.01" value="">
        </div>
        <div id="caixa-dinheiro">
            Em dinheiro <input type="number" step="0.01" value="">
        </div>
        <div id="banco-do-brasil">
            Banco do Brasil <input type="number" step="0.01" value="">
        </div>
        <div id="saldo">
            saldo <input type="number" value="" readonly>
        </div>

        <button id="btn-calcular">Calcular</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
